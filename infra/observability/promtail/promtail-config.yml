server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Accesos SSH y eventos PAM (auth.log)
  - job_name: auth_log
    static_configs:
      - targets:
          - localhost
        labels:
          job: auth_log
          host: cerebro
          __path__: /var/log/auth.log

  # Logs del sistema
  - job_name: syslog
    static_configs:
      - targets:
          - localhost
        labels:
          job: syslog
          host: cerebro
          __path__: /var/log/syslog

  # Docker containers (OpenClaw y cualquier otro)
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: container
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: stream

  # Journal del sistema — incluye Syncthing (user service con linger)
  - job_name: journal
    journal:
      max_age: 12h
      labels:
        job: journal
        host: cerebro
    relabel_configs:
      - source_labels: ['__journal__systemd_user_unit']
        target_label: unit
      - source_labels: ['__journal__syslog_identifier']
        target_label: syslog_identifier
      - source_labels: ['__journal_priority_keyword']
        target_label: level
