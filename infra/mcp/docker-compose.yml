services:

  filesystem-mcp:
    image: node:20-alpine
    container_name: filesystem-mcp
    command: ["sh", "-c", "npx -y mcp-proxy --port 3000 --server sse -- npx -y @modelcontextprotocol/server-filesystem /vault"]
    volumes:
      - ${VAULT_PATH}:/vault
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped

  grafana-mcp:
    build: ./grafana-mcp
    container_name: grafana-mcp
    command: ["-transport", "sse", "-address", "0.0.0.0:8000"]
    environment:
      - GRAFANA_URL=${GRAFANA_URL}
      - GRAFANA_SERVICE_ACCOUNT_TOKEN=${GRAFANA_SERVICE_ACCOUNT_TOKEN}
      - GRAFANA_ORG_ID=${GRAFANA_ORG_ID:-1}
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: mcp-caddy
    environment:
      - TAILSCALE_HOST=${TAILSCALE_HOST}
    ports:
      - "${TAILSCALE_IP}:3100:3100"
      - "${TAILSCALE_IP}:3101:3101"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/ssl/tailscale:/certs:ro
    depends_on:
      - filesystem-mcp
      - grafana-mcp
    restart: unless-stopped
